name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build:blog

      - name: Commit blog updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "build: atualizar blog [skip ci]"
          commit_user_name: "Fiter Bot"
          commit_user_email: "bot@fiter.com.br"

      - name: Deploy to Hostiger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /domains/fiter.com.br/public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git/**
            **/.gitignore
            **/node_modules/**
            **/.md/**
            **/.claude/**
            **/blog/posts/**
            **/blog/_layout-post.html
            **/blog/images/.gitkeep
            **/blog/modelo-post.md
            **/scripts/**
            **/*.md
            **/project-seo-audit.html
            **/fiter-seo-audit-v2.html
