name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # assets/minificação versionados no repo, só gera blog
      - run: npm run build:blog && npm run build:sitemap

      - name: Commit blog updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "build: atualizar blog [skip ci]"
          commit_user_name: "Fiter Bot"
          commit_user_email: "bot@fiter.com.br"

      - name: Deploy via rsync over SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          rsync -avz --delete -e "ssh -p ${{ secrets.SSH_PORT }}" \
            --exclude='.git/' \
            --exclude='.gitignore' \
            --exclude='node_modules/' \
            --exclude='.md/' \
            --exclude='.claude/' \
            --exclude='.github/' \
            --exclude='blog/posts/' \
            --exclude='blog/_layout-post.html' \
            --exclude='blog/images/.gitkeep' \
            --exclude='blog/modelo-post.md' \
            --exclude='scripts/' \
            --exclude='*.md' \
            --exclude='project-seo-audit.html' \
            --exclude='fiter-seo-audit-v2.html' \
            --exclude='.ftp-deploy-sync-state.json' \
            ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/u312193603/domains/fiter.com.br/public_html/
